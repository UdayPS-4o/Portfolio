# Portfolio stack for Dokploy.
#
#   web  → Next.js frontend  (portfolio.udayps.com / me.udayps.com)
#   api  → Express + WS + SQLite backend  (api.udayps.com)
#
# Routing is managed entirely by Dokploy's Traefik UI — no custom labels here.
# Set the following in Dokploy → Environment before deploying:
#
#   NEXT_PUBLIC_WS_URL   wss://api.udayps.com/ws
#   ADMIN_TOKEN          (optional, locks /api/stats)
#
# Dokploy domains to configure:
#   web service  → portfolio.udayps.com  port 3000  (HTTPS, letsencrypt)
#   web service  → me.udayps.com         port 3000  (HTTPS, letsencrypt)
#   api service  → api.udayps.com        port 4000  (HTTPS, letsencrypt)

services:
  web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-}
    container_name: uday-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    expose:
      - "3000"
    depends_on:
      - api

  api:
    build: ./api
    container_name: uday-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DB_PATH=/app/data/portfolio.db
      - CORS_ORIGIN=${CORS_ORIGIN:-https://portfolio.udayps.com,https://me.udayps.com}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
    volumes:
      - portfolio-data:/app/data
    expose:
      - "4000"

volumes:
  portfolio-data:

# Dokploy's shared Traefik network.
networks:
  default:
    name: dokploy-network
    external: true
